apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: microservices-health-care-auth-service:latest
        imagePullPolicy: Never
        command: ["sh", "-c"]
        args: ["npm run start:dev"]
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/postgres"
        - name: USER_SERVICE_URL
          value: "user-service:50051"